<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Лаб 9 - Варіант 17</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 15px;

            background: linear-gradient(to right, #74ebd5, #ACB6E5);

            min-height: 100vh;
        }

        .container {
            background: blue;
            padding: 20px;
            border-radius: 12px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .done {
            text-decoration: line-through;
            color: gray;
        }

        li {
            margin-bottom: 8px;
        }

        button {
            cursor: pointer;
            margin-left: 5px;
        }

        input {
            padding: 5px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>To-Do List (Варіант 17)</h2>

        <input id="taskInput" placeholder="Введіть завдання...">
        <button onclick="addTask()">Додати</button>
        <button onclick="sortTasks()">Сортувати за датою</button>

        <ul id="taskList"></ul>

    </div>

    <script>

        let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

        function render() {

            const list = document.getElementById("taskList");

            list.innerHTML = "";

            tasks.forEach((t, index) => {

                list.innerHTML += `
                    <li>
                        <input type="checkbox"
                               onchange="toggle(${index})"
                               ${t.done ? "checked" : ""}>

                        <span class="${t.done ? 'done' : ''}">
                            ${t.text}
                            <small>
                                (${new Date(t.date).toLocaleTimeString()})
                            </small>
                        </span>

                        <button onclick="del(${index})">❌</button>
                    </li>
                `;
            });

            localStorage.setItem("tasks", JSON.stringify(tasks));
        }

        function addTask() {

            const text = document.getElementById("taskInput").value;

            if (text === "") return;

            tasks.push({
                text: text,
                done: false,
                date: Date.now()
            });

            document.getElementById("taskInput").value = "";

            render();
        }

        function toggle(index) {

            tasks[index].done = !tasks[index].done;

            render();
        }

        function del(index) {

            tasks.splice(index, 1);

            render();
        }

        function sortTasks() {

            tasks.sort((a, b) => a.date - b.date);

            render();
        }

        render();

    </script>

</body>
</html>
