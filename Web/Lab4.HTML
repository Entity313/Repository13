<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лабораторна робота 4: Вступ до JavaScript</title>
</head>
<body>

  <h1>Лабораторна робота 4: Вступ до JavaScript</h1>

  <script>

    console.log("Завдання 1.");

    let userName = prompt("Введіть ваше ім'я:");

    let greeting = "Привіт, " + userName + "! Радий тебе бачити!";

    alert(greeting);
    console.log(greeting);


    console.log("Завдання 2.");

    let num1 = Number(prompt("Введіть перше число:"));
    let num2 = Number(prompt("Введіть друге число:"));

    let multiplication = num1 * num2;
    let division = num1 / num2;

    alert("Добуток: " + multiplication + "\nЧастка: " + division);

    console.log("Добуток:", multiplication);
    console.log("Частка:", division);


    console.log("Завдання 3.");

    let birthYear = Number(prompt("Введіть ваш рік народження:"));

    const currentYear = 2025;
    const myAge = 18;

    let userAge = currentYear - birthYear;

    let ageDifference = Math.abs(userAge - myAge);

    let message = "Ваш вік: " + userAge + " років.\n";

    if (userAge > myAge) {
      message += "Користувач старший на " + ageDifference + " років.";
    } else if (userAge < myAge) {
      message += "Користувач молодший на " + ageDifference + " років.";
    } else {
      message += "Ви одного віку.";
    }

    alert(message);
    console.log(message);

  </script>

</body>
</html>
